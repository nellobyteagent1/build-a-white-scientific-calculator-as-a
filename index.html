<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1: Scientific functions -->
      <button class="btn fn" data-action="sin">sin</button>
      <button class="btn fn" data-action="cos">cos</button>
      <button class="btn fn" data-action="tan">tan</button>
      <button class="btn fn" data-action="log">log</button>
      <button class="btn fn" data-action="ln">ln</button>

      <!-- Row 2: More scientific -->
      <button class="btn fn" data-action="sqrt">&radic;</button>
      <button class="btn fn" data-action="power">x<sup>y</sup></button>
      <button class="btn fn" data-action="pi">&pi;</button>
      <button class="btn fn" data-action="e">e</button>
      <button class="btn fn" data-action="paren">(  )</button>

      <!-- Row 3: Clear, delete, percent, sign, divide -->
      <button class="btn control" data-action="clear">AC</button>
      <button class="btn control" data-action="delete">DEL</button>
      <button class="btn fn" data-action="percent">%</button>
      <button class="btn fn" data-action="toggle">&plusmn;</button>
      <button class="btn op" data-action="divide">&divide;</button>

      <!-- Row 4: 7 8 9 * -->
      <button class="btn num" data-action="7">7</button>
      <button class="btn num" data-action="8">8</button>
      <button class="btn num" data-action="9">9</button>
      <button class="btn op" data-action="multiply">&times;</button>

      <!-- Row 5: 4 5 6 - -->
      <button class="btn num" data-action="4">4</button>
      <button class="btn num" data-action="5">5</button>
      <button class="btn num" data-action="6">6</button>
      <button class="btn op" data-action="subtract">&minus;</button>

      <!-- Row 6: 1 2 3 + -->
      <button class="btn num" data-action="1">1</button>
      <button class="btn num" data-action="2">2</button>
      <button class="btn num" data-action="3">3</button>
      <button class="btn op" data-action="add">+</button>

      <!-- Row 7: 0 . = -->
      <button class="btn num zero" data-action="0">0</button>
      <button class="btn num" data-action="dot">.</button>
      <button class="btn equals" data-action="equals">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
